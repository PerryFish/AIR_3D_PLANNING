/**:
  ros__parameters:
    map:
      x_min: -10.0
      x_max: 10.0
      y_min: -10.0
      y_max: 10.0
      z_min: 0.5
      z_max: 6.0
      resolution: 0.5
      inflation_radius: 0.3
    world:
      scenario_type: random_occupancy_3d
      occupancy_ratio: 0.50
      random_seed: 42
      ensure_connectivity: true
      max_generation_attempts: 100
      publish_inflated_obstacles: true
    planner:
      algorithm: weighted_astar_3d
      allow_diagonal: true
      heuristic_weight: 1.5
      max_planning_time: 5.0
      max_expanded_nodes: 200000
      allow_periodic_replan: false
      replan_period: 5.0
      goal_duplicate_threshold: 0.05
      start_duplicate_threshold: 0.05
    uav:
      max_speed: 1.5
      goal_tolerance: 0.35
      initial_x: -8.0
      initial_y: -8.0
      initial_z: 1.0
    mission:
      goal_x: 8.0
      goal_y: 8.0
      goal_z: 4.5
      auto_start: true
    sample_spacing: 0.5
    frame_id: map
