  - /uncovered_frontier_cloud
recommended_air_topic_mapping:
- tare_topic: /registered_scan
  air_topic: /exploration/local_sensor_cloud or /exploration/observed_structure_cloud
- tare_topic: /overall_map
  air_topic: /exploration/garage_structure_cloud plus /exploration/observed_structure_cloud
- tare_topic: /terrain_map
  air_topic: /exploration/structure_cloud or /exploration/occupied_cloud
- tare_topic: /terrain_map_ext
  air_topic: /exploration/local_obstacle_cloud or /exploration/occupied_cloud
- tare_topic: /global_path
  air_topic: /aerial_exploration/path
- tare_topic: /local_path
  air_topic: /aerial_exploration/path or future local path publisher
- tare_topic: /path
  air_topic: /exploration/trajectory_path
- tare_topic: /way_point
  air_topic: /aerial_exploration/goal or /aerial_exploration/selected_goal_marker
- tare_topic: /tare_visualizer/local_planning_horizon
  air_topic: /exploration/local_planning_box
- tare_topic: /viewpoint_vis_cloud
  air_topic: /exploration/frontier_cloud or future viewpoint candidate cloud
- tare_topic: /selected_viewpoint_vis_cloud
  air_topic: /aerial_exploration/selected_goal_marker or future selected viewpoint
    cloud
- tare_topic: /navigation_boundary
  air_topic: future /exploration/navigation_boundary marker/polygon
- tare_topic: /camera/image_raw
  air_topic: future Gazebo camera topic
notes:
- This bundle is for RViz/display reproduction only; no AIR algorithm files were modified
  in this collection pass.
- TARE planner RViz fixed frame is map.
- vehicle_simulator.rviz highlights /registered_scan as the live grey-white structure
  cloud.
- tare_planner_ground.rviz highlights /overall_map, /explored_areas, local planning
  horizon, paths, waypoints, and viewpoint clouds.
- The large original garage preview pointcloud is recorded but not copied to keep
  bundle size manageable.
