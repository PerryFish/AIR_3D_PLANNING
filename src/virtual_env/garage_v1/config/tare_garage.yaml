tare_planner_node:
  ros__parameters:
    sub_start_exploration_topic_ : /start_exploration
    sub_terrain_map_topic_ : /terrain_map
    sub_terrain_map_ext_topic_ : /terrain_map_ext
    sub_state_estimation_topic_ : /state_estimation_at_scan
    sub_registered_scan_topic_ : /registered_scan
    sub_coverage_boundary_topic_ : /sensor_coverage_planner/coverage_boundary
    sub_viewpoint_boundary_topic_ : /navigation_boundary
    sub_nogo_boundary_topic_ : /sensor_coverage_planner/nogo_boundary
    sub_joystick_topic_ : /joy
    sub_reset_waypoint_topic_ : /reset_waypoint
    pub_exploration_finish_topic_ : exploration_finish
    pub_runtime_breakdown_topic_ : runtime_breakdown
    pub_runtime_topic_ : /runtime
    pub_waypoint_topic_ : /way_point
    pub_momentum_activation_count_topic_ : momentum_activation_count

    # ============================================================
    # NARROW SPACE DEADLOCK FIX PARAMETERS (Added for narrow passages)
    # ============================================================
    # Maximum exploration time before forcing exploration_finish (seconds)
    # This is a SAFETY MECHANISM to prevent infinite deadlock
    kMaxExplorationTimeSeconds : 600.0
    # Number of consecutive cycles where robot cannot make progress before giving up
    kStuckCycleThreshold : 50
    # Distance threshold to consider robot as "making progress" (meters)
    kProgressDistanceThreshold : 0.5
    # ============================================================

    # ============================================================
    # WAYPOINT DEADLOCK FIX PARAMETERS (Critical for stuck waypoints)
    # ============================================================
    # Maximum time (seconds) to stay at same waypoint before forcing permanent blacklist
    # ABSOLUTE TIMEOUT: No matter what robot does, timeout after this duration
    kWaypointTimeout : 15.0
    # Maximum retry attempts before forcing aggressive reset
    # After this many retries, waypoint is set very close to robot to force replanning
    kWaypointMaxRetries : 1
    # ============================================================

    # ============================================================
    # REGION BLACKLIST FIX PARAMETERS (For fence/barrier deadlocks)
    # ============================================================
    # Radius (meters) of region to blacklist when waypoint is unreachable
    # Set to ~2x the robot size to block the area around stuck waypoints
    kRegionBlacklistRadius : 2.0
    # Maximum number of blacklisted regions to track
    # Prevents memory overflow in large environments
    kRegionBlacklistMaxSize : 10
    # Maximum retries per region before permanent blacklist
    # After this, the region is considered permanently unreachable
    kRegionBlacklistMaxRetries : 5
    # ============================================================

    kAutoStart : true
    kRushHome : false
    kUseTerrainHeight : true
    kCheckTerrainCollision : true
    kExtendWayPoint : true
    kUseLineOfSightLookAheadPoint : true
    kNoExplorationReturnHome : false
    kExtendWayPointDistanceBig : 8.0
    kExtendWayPointDistanceSmall : 4.5
    kKeyposeCloudDwzFilterLeafSize : 0.2
    kRushHomeDist : 10.0
    kAtHomeDistThreshold : 0.5
    kTerrainCollisionThreshold : 0.5
    kLookAheadDistance : 8.0
    # FIX: Enable momentum to prevent oscillation in narrow spaces
    kUseMomentum : true
    # FIX: Increase direction change threshold to make robot more persistent
    kDirectionChangeCounterThr : 12
    # FIX: Increase no-change threshold to reduce direction switching
    kDirectionNoChangeCounterThr : 10
    kResetWaypointJoystickAxesID : 2

    # PlanningEnv
    kUseFrontier : true
    kFrontierClusterTolerance : 2.0
    kFrontierClusterMinSize : 20
    kUseCoverageBoundaryOnFrontier : false 
    kUseCoverageBoundaryOnObjectSurface : false

    # Rolling occupancy grid
    rolling_occupancy_grid/resolution_x : 0.3
    rolling_occupancy_grid/resolution_y : 0.3
    rolling_occupancy_grid/resolution_z : 0.3

    kSurfaceCloudDwzLeafSize : 0.5
    kCollisionCloudDwzLeafSize : 0.2
    kKeyposeCloudStackNum : 3
    kPointCloudRowNum : 50
    kPointCloudColNum : 50
    kPointCloudLevelNum : 30
    kMaxCellPointNum : 100000
    kPointCloudCellSize : 18.0
    kPointCloudCellHeight : 1.8
    kPointCloudManagerNeighborCellNum : 3
    kCoverCloudZSqueezeRatio : 2.0

    # KeyposeGraph
    keypose_graph/kAddNodeMinDist : 1.0
    keypose_graph/kAddNonKeyposeNodeMinDist : 0.5
    keypose_graph/kAddEdgeConnectDistThr : 3.0
    keypose_graph/kAddEdgeToLastKeyposeDistThr : 3.0
    keypose_graph/kAddEdgeVerticalThreshold : 1.0
    keypose_graph/kAddEdgeCollisionCheckResolution : 0.4
    keypose_graph/kAddEdgeCollisionCheckRadius : 0.4
    keypose_graph/kAddEdgeCollisionCheckPointNumThr : 1

    # ViewPointManager
    viewpoint_manager/number_x : 40
    viewpoint_manager/number_y : 40
    viewpoint_manager/number_z : 1
    viewpoint_manager/resolution_x : 1.2
    viewpoint_manager/resolution_y : 1.2
    viewpoint_manager/resolution_z : 0.0
    kConnectivityHeightDiffThr : 0.25
    kGreedyViewPointSampleRange : 3
    kLocalPathOptimizationItrMax : 10
    # ============================================================
    # NARROW SPACE FIX: Reduce collision margins to allow tighter passages
    # ============================================================
    # FIX: Reduce collision margin to allow robot to pass through narrow spaces
    kViewPointCollisionMargin : 0.5
    # FIX: Reduce Z-axis collision margins
    kViewPointCollisionMarginZPlus : 0.3
    kViewPointCollisionMarginZMinus : 0.3
    kCollisionGridZScale : 1.0
    # FIX: Increase collision grid resolution to be less sensitive to small obstacles
    kCollisionGridResolutionX : 0.3
    kCollisionGridResolutionY : 0.3
    kCollisionGridResolutionZ : 0.0
    # FIX: Reduce point threshold so robot doesn't get scared by few scattered points
    kCollisionPointThr : 1
    kLineOfSightStopAtNearestObstacle : true
    kViewPointHeightFromTerrain : 0.75
    kViewPointHeightFromTerrainChangeThreshold : 0.6
    kCheckDynamicObstacleCollision : false
    kCollisionFrameCountMax : 3

    kSensorRange : 12.0
    kNeighborRange : 4.0
    kCoverageOcclusionThr : 0.3
    kCoverageDilationRadius : 1.0

    # Grid World - REDUCED for garage environment (smaller area)
    # These control how many cells the global planner manages
    # Reducing these numbers decreases TSP problem size significantly
    kGridWorldXNum : 61
    kGridWorldYNum : 61
    kGridWorldZNum : 61
    kGridWorldCellHeight : 3.0
    kGridWorldNearbyGridNum : 3
    kMinAddPointNumSmall : 40
    kMinAddPointNumBig : 60
    kMinAddFrontierPointNum : 15
    kCellExploringToCoveredThr : 1
    kCellCoveredToExploringThr: 5
    kCellExploringToAlmostCoveredThr: 5
    kCellAlmostCoveredToExploringThr: 10
    kCellUnknownToExploringThr: 1

    # Visualization
    kExploringSubspaceMarkerColorGradientAlpha : true
    kExploringSubspaceMarkerColorMaxAlpha : 0.8
    kExploringSubspaceMarkerColorR : 0.0
    kExploringSubspaceMarkerColorG : 1.0
    kExploringSubspaceMarkerColorB : 0.0
    kExploringSubspaceMarkerColorA : 1.0
    kLocalPlanningHorizonMarkerColorR : 0.0
    kLocalPlanningHorizonMarkerColorG : 1.0
    kLocalPlanningHorizonMarkerColorB : 0.0
    kLocalPlanningHorizonMarkerColorA : 1.0
    kLocalPlanningHorizonMarkerWidth : 0.3
    kLocalPlanningHorizonHeight : 3.0